<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wakore</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f7f3ee;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -3px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 30px;
    }

    .tag {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: white;
      border: 1px solid #ddd;
      font-size: 14px;
      color: #666;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 52px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Wakore</h1>

    <p>
      Discover fun, stylish and unique finds curated for everyday life in Japan.
    </p>

    <div class="tag">
      Coming Soon • wakore.jp
    </div>
  </div>
</body>
</html>
